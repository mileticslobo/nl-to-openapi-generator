openapi: "3.0.3"
info:
  title: Users API
  description: API for managing users, supporting listing with status filtering and user creation.
  version: "1.0.0"
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      description: Retrieve a paginated list of users, optionally filtered by status.
      parameters:
        - name: status
          in: query
          description: Filter users by their account status.
          required: false
          schema:
            type: string
            enum: [active, inactive, pending]
        - name: page
          in: query
          description: Page number (1-based).
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of results per page.
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: A paginated list of users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  total:
                    type: integer
                    description: Total number of matching users.
                  page:
                    type: integer
                  limit:
                    type: integer
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a user
      operationId: createUser
      description: Create a new user account with a name and email address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "422":
          description: Validation error (e.g. missing fields or invalid email).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Auto-generated unique identifier.
        name:
          type: string
          description: Full name of the user.
        email:
          type: string
          format: email
          description: User's email address (must be unique).
        status:
          type: string
          enum: [active, inactive, pending]
          description: Current account status.
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the user was created.
      required:
        - id
        - name
        - email
        - status
        - createdAt
    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Full name of the new user.
        email:
          type: string
          format: email
          description: Email address of the new user.
      required:
        - name
        - email
    Error:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error description.
        code:
          type: integer
          description: Machine-readable error code.
      required:
        - message
